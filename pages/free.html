<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CODYSSEY — Free Content</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="../shared/css/animations.css">
  <link rel="stylesheet" href="../catalog/catalog.css">
  <style>
    .free-subtitle {
      font-family: 'Fredoka', sans-serif;
      color: var(--ink-light);
      font-size: clamp(12px, 1.8vw, 15px);
      text-align: center;
      margin-bottom: clamp(8px, 1.5vh, 16px);
      opacity: 0.8;
    }
    /* Slider wrapper — arrows outside */
    .slider-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      min-height: 0;
      gap: clamp(12px, 2vw, 24px);
      padding: 0 clamp(8px, 2vw, 20px);
    }
    /* Override grid → horizontal slider */
    .catalog-grid {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      justify-content: flex-start;
      align-items: center;
      gap: clamp(12px, 2vw, 20px);
      padding: 8px 0;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-width: 0;
    }
    .catalog-grid::-webkit-scrollbar {
      height: 6px;
    }
    .catalog-grid::-webkit-scrollbar-track {
      background: transparent;
    }
    .catalog-grid::-webkit-scrollbar-thumb {
      background: var(--paper-dark);
      border-radius: 3px;
    }
    .catalog-grid .catalog-card {
      flex-shrink: 0;
      scroll-snap-align: start;
    }
    .catalog-grid .catalog-card-image {
      margin-left: 0;
    }
    .slider-spacer {
      flex-shrink: 0;
      width: 4px;
    }
    /* Arrow buttons */
    .slider-arrow {
      flex-shrink: 0;
      background: var(--paper);
      border: 2px solid var(--paper-dark);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(44, 24, 16, 0.15);
    }
    .slider-arrow:hover {
      opacity: 1;
      box-shadow: 0 4px 12px rgba(44, 24, 16, 0.25);
    }
    .slider-arrow img {
      width: 20px;
      height: 20px;
    }
    .slider-arrow-right img {
      transform: rotate(180deg);
    }
    @media (max-width: 600px) {
      .slider-wrapper { padding: 0 4px; }
      .slider-arrow {
        width: 32px;
        height: 32px;
      }
      .slider-arrow img {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>
<body class="catalog-page">

  <a class="page-back-btn" href="../">
    <img src="../shared/img/Icons/chevron-left.png" alt="">
    <span data-lang="menuBack"></span>
  </a>

  <div class="top-buttons">
    <button class="top-btn fullscreen-btn" id="fullscreenToggle" data-lang-title="fullscreenEnter"><img src="../shared/img/Icons/maximize.png" alt=""></button>
    <button class="top-btn sound-btn" id="soundToggle" data-lang-title="soundTitle"><img src="../shared/img/Icons/volume-2.png" alt=""></button>
  </div>

  <div class="catalog-container">
    <header class="catalog-header">
      <div class="catalog-nav">
        <a href="../"><img src="../shared/img/logo.png" alt="CODYSSEY" class="catalog-logo"></a>
        <nav class="catalog-menu" id="catalogMenu">
          <a href="about.html" class="menu-item"><img src="../shared/img/Icons/info.png" class="menu-icon" alt=""> <span data-lang="menuAbout"></span></a>
          <a href="https://www.etsy.com/" target="_blank" rel="noopener" class="menu-item"><img src="../shared/img/Icons/shopping-cart.png" class="menu-icon" alt=""> <span data-lang="menuShop"></span></a>
          <a href="free.html" class="menu-item"><img src="../shared/img/Icons/download.png" class="menu-icon" alt=""> <span data-lang="menuFree"></span></a>
          <a href="contact.html" class="menu-item"><img src="../shared/img/Icons/mail.png" class="menu-icon" alt=""> <span data-lang="menuContact"></span></a>
          <button class="menu-item menu-btn" id="langToggle" title="Language"><img src="../shared/img/Icons/globe.png" class="menu-icon" alt=""> <span data-lang="menuLang"></span></button>
        </nav>
        <button class="catalog-hamburger" id="menuToggle"><img src="../shared/img/Icons/menu.png" class="icon" style="width:20px;height:20px;" alt=""></button>
      </div>
    </header>

    <p class="free-subtitle" data-lang="freeSubtitle"></p>

    <!-- Slider -->
    <div class="slider-wrapper">
      <button class="slider-arrow slider-arrow-left" id="sliderLeft"><img src="../shared/img/Icons/chevron-left.png" alt=""></button>
      <div class="catalog-grid" id="freeGrid"></div>
      <button class="slider-arrow slider-arrow-right" id="sliderRight"><img src="../shared/img/Icons/chevron-left.png" alt=""></button>
    </div>

    <footer class="catalog-footer">
      &copy; 2026 Kandelucky
    </footer>
  </div>

  <script src="../shared/js/sound-manager.js"></script>
  <script src="../shared/js/fullscreen.js"></script>
  <script src="../shared/js/lang-switcher.js"></script>
  <script>
    (function() {
      window._langBasePath = '../shared/';

      // 10 placeholder free content cards
      var FREE_ITEMS = [];
      for (var i = 1; i <= 10; i++) {
        FREE_ITEMS.push({
          id: 'free_soon_' + i,
          titleKey: 'free_soon_title',
          subtitleKey: 'free_soon_subtitle',
          comingSoon: true
        });
      }

      // Sound
      window.sound = new SoundManager();
      var soundBtn = document.getElementById('soundToggle');
      if (soundBtn) {
        soundBtn.addEventListener('click', function() {
          window.sound.init(); window.sound.toggle(); window.sound.click();
        });
      }

      // Hamburger
      var menuToggle = document.getElementById('menuToggle');
      var catalogMenu = document.getElementById('catalogMenu');
      if (menuToggle && catalogMenu) {
        menuToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          catalogMenu.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.catalog-nav')) catalogMenu.classList.remove('open');
        });
      }

      // "Coming soon" click sound
      function playComingSoonSound() {
        try {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.2);
        } catch (e) {}
      }

      // Render cards
      function renderCards(strings) {
        var grid = document.getElementById('freeGrid');
        grid.innerHTML = '<div class="slider-spacer"></div>';

        FREE_ITEMS.forEach(function(item) {
          var card = document.createElement('a');
          card.className = 'catalog-card';
          card.href = '#';

          card.addEventListener('click', function(e) {
            e.preventDefault();
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'pop 0.2s ease';
            playComingSoonSound();
            if (!item.comingSoon && item.url) {
              setTimeout(function() { window.location.href = item.url; }, 250);
            }
          });

          var title = (strings && item.titleKey && strings[item.titleKey]) || '?';
          var subtitle = (strings && item.subtitleKey && strings[item.subtitleKey]) || '';

          var imageContent = item.coverImage
            ? '<img src="' + item.coverImage + '" alt="' + title + '" loading="lazy">'
            : '<div class="catalog-card-placeholder" style="font-size:64px;opacity:0.3;">?</div>';

          card.innerHTML =
            '<div class="catalog-card-image">' +
              imageContent +
            '</div>' +
            '<div class="catalog-card-body">' +
              '<p>' + subtitle + '</p>' +
            '</div>' +
            '<div class="catalog-card-badge">' +
              '<img src="../shared/img/catalog_img/button_for_category_cards_v1.png" alt="">' +
              '<span>' + title + '</span>' +
            '</div>';

          grid.appendChild(card);
        });

        var endSpacer = document.createElement('div');
        endSpacer.className = 'slider-spacer';
        grid.appendChild(endSpacer);
      }

      // Language
      if (!window.applyLanguageStrings) {
        window.applyLanguageStrings = function(strings) {
          document.querySelectorAll('[data-lang]').forEach(function(el) {
            var key = el.getAttribute('data-lang');
            if (strings[key]) el.textContent = strings[key];
          });
          document.querySelectorAll('[data-lang-title]').forEach(function(el) {
            var key = el.getAttribute('data-lang-title');
            if (strings[key]) el.title = strings[key];
          });
        };
      }

      var availableLangs = ['ka', 'en'];
      var browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
      var detectedLang = availableLangs.indexOf(browserLang) !== -1 ? browserLang : 'en';
      var lang = localStorage.getItem('codyssey_lang') || detectedLang;
      document.documentElement.lang = lang;

      fetch('../shared/lang/' + lang + '.json?v=3')
        .then(function(r) { return r.json(); })
        .then(function(strings) {
          window.langStrings = strings;
          if (window.applyLanguageStrings) window.applyLanguageStrings(strings);
          renderCards(strings);
        });

      // Slider arrows
      var grid = document.getElementById('freeGrid');
      var leftBtn = document.getElementById('sliderLeft');
      var rightBtn = document.getElementById('sliderRight');
      function getScrollStep() {
        var card = grid.querySelector('.catalog-card');
        if (!card) return 200;
        return card.offsetWidth + parseInt(getComputedStyle(grid).gap || 16);
      }
      if (leftBtn) {
        leftBtn.addEventListener('click', function() {
          grid.scrollBy({ left: -getScrollStep(), behavior: 'smooth' });
        });
      }
      if (rightBtn) {
        rightBtn.addEventListener('click', function() {
          grid.scrollBy({ left: getScrollStep(), behavior: 'smooth' });
        });
      }

      // Language change callback
      window.onLanguageChange = function(langCode, strings) {
        if (window.applyLanguageStrings) window.applyLanguageStrings(strings);
        renderCards(strings);
      };
    })();
  </script>
</body>
</html>
